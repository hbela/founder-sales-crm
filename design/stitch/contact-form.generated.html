<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Founder CRM - Contact Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: "#0047ab",
                            foreground: "#ffffff"
                        },
                        accent: {
                            DEFAULT: "#9effa9",
                            foreground: "#0a1931"
                        },
                        background: "#f2eded",
                        foreground: "#0a1931",
                        sidebar: "#0a1931"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["DM Sans", "sans-serif"],
                        display: ["DM Sans", "sans-serif"],
                        body: ["DM Sans", "sans-serif"],
                        label: ["DM Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; letter-spacing: 0.02em; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-[#f2eded] text-[#0a1931] antialiased overflow-hidden">
<!-- Background UI Mockup (Blurred CRM Shell) -->
<div class="fixed inset-0 flex overflow-hidden">
<!-- Sidebar Shell (From JSON) -->
<aside class="fixed left-0 top-0 h-full w-64 bg-[#0a1931] flex flex-col py-6 shadow-lg z-0 opacity-50 blur-sm pointer-events-none">
<div class="px-6 mb-8">
<div class="text-xl font-headline font-semibold text-white">Founder CRM</div>
<div class="text-xs text-slate-400">Sales Engine</div>
</div>
<nav class="flex-1 space-y-1">
<div class="bg-[#0047ab] text-white rounded-lg mx-2 px-4 py-2 flex items-center gap-3">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-body text-label tracking-wide">Dashboard</span>
</div>
<div class="text-slate-300 hover:text-white rounded-lg mx-2 px-4 py-2 flex items-center gap-3">
<span class="material-symbols-outlined">group</span>
<span class="font-body text-label tracking-wide">Contacts</span>
</div>
</nav>
</aside>
<!-- Main Content Canvas (Blurred) -->
<main class="ml-64 flex-1 p-8 opacity-40 blur-md pointer-events-none">
<header class="flex justify-between items-center mb-10">
<h1 class="text-3xl font-semibold">Contacts</h1>
<button class="bg-[#0047ab] text-white px-6 py-2.5 rounded-xl font-medium">New contact</button>
</header>
<div class="grid grid-cols-4 gap-6 mb-8">
<div class="bg-white p-6 rounded-2xl shadow-sm">
<div class="w-11 h-11 bg-primary/10 text-primary flex items-center justify-center rounded-xl mb-4">
<span class="material-symbols-outlined">group</span>
</div>
<div class="text-slate-500 text-sm">Total Contacts</div>
<div class="text-2xl font-bold">1,284</div>
</div>
<div class="bg-white p-6 rounded-2xl shadow-sm">
<div class="w-11 h-11 bg-primary/10 text-primary flex items-center justify-center rounded-xl mb-4">
<span class="material-symbols-outlined">bolt</span>
</div>
<div class="text-slate-500 text-sm">Active Leads</div>
<div class="text-2xl font-bold">412</div>
</div>
<div class="bg-white p-6 rounded-2xl shadow-sm">
<div class="w-11 h-11 bg-primary/10 text-primary flex items-center justify-center rounded-xl mb-4">
<span class="material-symbols-outlined">payments</span>
</div>
<div class="text-slate-500 text-sm">Pipeline Value</div>
<div class="text-2xl font-bold">$2.4M</div>
</div>
<div class="bg-white p-6 rounded-2xl shadow-sm">
<div class="w-11 h-11 bg-primary/10 text-primary flex items-center justify-center rounded-xl mb-4">
<span class="material-symbols-outlined">trending_up</span>
</div>
<div class="text-slate-500 text-sm">Conversion Rate</div>
<div class="text-2xl font-bold">12.4%</div>
</div>
</div>
<div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
<div class="h-16 border-b border-slate-100 px-6 flex items-center justify-between">
<div class="font-semibold">Recent Prospects</div>
</div>
<div class="p-20 flex flex-col items-center justify-center text-center">
<div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-slate-300 scale-150">person_search</span>
</div>
<div class="text-slate-400">Loading data engine...</div>
</div>
</div>
</main>
</div>
<!-- MODAL OVERLAY -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 transition-all duration-300" id="modal-container">
<!-- Backdrop -->
<div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300"></div>
<!-- Modal Card -->
<div class="relative bg-white w-full max-w-[640px] rounded-2xl shadow-xl overflow-hidden flex flex-col transform transition-all scale-100 opacity-100 duration-300">
<!-- Header -->
<div class="px-8 pt-8 pb-6 border-b border-slate-50 flex justify-between items-start">
<div>
<h2 class="text-xl font-semibold text-slate-900 leading-tight">New contact</h2>
<p class="text-sm text-slate-500 mt-1">Add a new prospect to your CRM</p>
</div>
<button class="p-2 text-slate-400 hover:bg-slate-50 hover:text-slate-600 rounded-lg transition-colors group">
<span class="material-symbols-outlined text-[22px]">close</span>
</button>
</div>
<!-- Body -->
<div class="px-8 py-6 max-h-[716px] overflow-y-auto">
<form class="space-y-5">
<!-- Row 1 -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">First name <span class="text-red-500">*</span></label>
<input class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="e.g. Sarah" type="text"/>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Last name <span class="text-red-500">*</span></label>
<input class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="e.g. Jenkins" type="text"/>
</div>
</div>
<!-- Row 2 -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Company</label>
<input class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Global Tech Corp" type="text"/>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Email <span class="text-red-500">*</span></label>
<input class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="sarah.j@company.com" type="email"/>
</div>
</div>
<!-- Row 3 -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Phone</label>
<input class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Website</label>
<input class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="https://example.com" type="url"/>
</div>
</div>
<!-- Row 4 -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Industry</label>
<select class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all appearance-none cursor-pointer">
<option disabled="" selected="" value="">Select industry...</option>
<option value="tech">SaaS / Technology</option>
<option value="fintech">Fintech</option>
<option value="healthcare">Healthcare</option>
<option value="manufacturing">Manufacturing</option>
</select>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Country</label>
<input class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="e.g. United States" type="text"/>
</div>
</div>
<!-- Row 5 -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Status</label>
<select class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all appearance-none cursor-pointer">
<option selected="" value="new">New</option>
<option value="qualified">Qualified</option>
<option value="proposition">Proposition</option>
<option value="negotiation">Negotiation</option>
</select>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Product</label>
<select class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all appearance-none cursor-pointer">
<option selected="" value="none">None</option>
<option value="enterprise">Enterprise Suite</option>
<option value="growth">Growth Plan</option>
<option value="starter">Starter Pack</option>
</select>
</div>
</div>
<!-- Notes -->
<div class="space-y-1.5">
<label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Notes</label>
<textarea class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all resize-none placeholder:text-slate-400" placeholder="Add any specific context or previous conversation summaries..." rows="3"></textarea>
</div>
</form>
</div>
<!-- Footer -->
<div class="px-8 py-6 bg-slate-50/50 border-t border-slate-100 flex items-center justify-end gap-3">
<button class="px-6 py-2.5 text-sm font-semibold text-slate-600 hover:text-slate-900 border border-slate-200 hover:border-slate-400 rounded-xl transition-all active:scale-95 bg-white">
                    Cancel
                </button>
<button class="px-8 py-2.5 text-sm font-semibold text-white bg-[#0047ab] hover:bg-[#003d94] rounded-xl shadow-md shadow-primary/20 transition-all active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Save contact
                </button>
</div>
</div>
</div>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.querySelector('#modal-container > div:last-child');
            const backdrop = document.querySelector('#modal-container > div:first-child');
            const cancelBtn = document.querySelector('button:contains("Cancel")');
            const closeBtn = document.querySelector('button:has(.material-symbols-outlined:contains("close"))');

            // Add simple hover sounds or feedback could go here
            
            // Simple keyboard accessibility
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    // Logic to "close" modal (visual only for this demo)
                    backdrop.classList.add('opacity-0');
                    modal.classList.add('scale-95', 'opacity-0');
                    setTimeout(() => {
                        console.log('Modal dismissed via keyboard');
                    }, 300);
                }
            });

            // Prevent scroll on body while modal is open
            document.body.style.overflow = 'hidden';
        });

        // Helper selector polyfill for demo purposes if needed
        if (!Element.prototype.contains) {
            Element.prototype.contains = function(str) {
                return this.textContent.includes(str);
            };
        }
    </script>
</body></html>
